<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Interviewer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-brands fa-github logo-icon"></i>
                <h2>Repo Interviewer</h2>
            </div>
            
            <div class="ingest-section">
                <h3><i class="fa-solid fa-code-branch"></i> Analyze Repository</h3>
                <p class="section-desc">Enter a GitHub repository URL to clone, chunk, and embed its codebase.</p>
                <form id="ingest-form">
                    <div class="input-group">
                        <input type="url" id="repo-url" placeholder="https://github.com/user/repo" required>
                    </div>
                    <button type="submit" id="ingest-btn" class="primary-btn">
                        <span>Ingest Codebase</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <div id="ingest-status" class="hidden"></div>
                </form>
            </div>
            
            <div class="sidebar-footer">
                <div class="status-indicator model-status">
                    <span class="dot green"></span>
                    <span class="status-text">Ollama Llama 3.1</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="active-repo">
                    <i class="fa-solid fa-folder-open"></i>
                    <span id="current-repo-display">No repository loaded</span>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h1>Welcome to Repo Interviewer</h1>
                    <p>Ingest a repository from the sidebar to start asking questions about the codebase!</p>
                </div>
            </div>

            <div class="chat-input-wrapper">
                <form id="chat-form">
                    <div class="input-container">
                        <textarea id="question-input" placeholder="Ask a question about the repository..." rows="1" disabled></textarea>
                        <button type="submit" id="send-btn" disabled>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
