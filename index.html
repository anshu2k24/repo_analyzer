<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Interviewer | Terminal</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --container-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #00ff41;
            /* Terminal green */
            --error-color: #ff5555;
            --border-color: #333;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .header p {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--accent-color);
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 25px;
            font-family: var(--font-mono);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: opacity 0.3s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 255, 65, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .response-box {
            border: 1px solid var(--border-color);
            background-color: #000;
            border-radius: 4px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
            color: var(--text-color);
            display: none;
        }

        .response-box.active {
            display: block;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            display: none;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>> RAG_INTERVIEWER_UI</h1>
            <p>Analyze repository and ask context-aware questions.</p>
        </div>

        <div class="input-group">
            <textarea id="questionInput"
                placeholder="Enter your question here... (Enter to ask, Shift+Enter for new line)"></textarea>
            <div class="controls">
                <div id="errorMsg" class="error-message">Error connecting to server.</div>
                <div id="loading" class="spinner"></div>
                <button id="askBtn">ASK</button>
            </div>
        </div>

        <div id="responseBox" class="response-box"></div>
    </div>

    <script>
        const questionInput = document.getElementById('questionInput');
        const askBtn = document.getElementById('askBtn');
        const responseBox = document.getElementById('responseBox');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');

        async function handleAsk() {
            const question = questionInput.value.trim();
            if (!question) return;

            // UI State: Loading
            askBtn.disabled = true;
            loading.style.display = 'block';
            errorMsg.style.display = 'none';
            responseBox.classList.remove('active');
            responseBox.textContent = '';

            try {
                const response = await fetch('http://127.0.0.1:8000/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question }),
                });

                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }

                const data = await response.json();

                // Success: Display Result
                responseBox.textContent = data.answer || "No answer returned.";
                responseBox.classList.add('active');

                // Auto-scroll to response
                responseBox.scrollTop = 0;

            } catch (err) {
                console.error('Fetch error:', err);
                errorMsg.textContent = `Error: ${err.message || 'Could not reach the server'}`;
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                askBtn.disabled = false;
            }
        }

        askBtn.addEventListener('click', handleAsk);

        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleAsk();
            }
        });

        // Focus input on load
        window.addEventListener('load', () => {
            questionInput.focus();
        });
    </script>
</body>

</html>
